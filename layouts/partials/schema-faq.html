{{/* FAQPage schema on FAQ page */}}
{{ if and (eq .Section "faq") (.IsSection) }}
{{ $faqs := .Params.faqs }}
{{ if $faqs }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $index, $item := $faqs -}}
    {{- if $index }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $item.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $item.answer }}"
      }
    }
    {{- end -}}
  ]
}
</script>
{{ end }}
{{ end }}
